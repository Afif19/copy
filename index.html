<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi Manajemen Toko Bangunan</title>
</head>
<body>
    <script src="assets/js/db.js"></script>
    <script>
        // FUNGSI: Mengecek status session login pengguna dan mengalihkan (redirect) halaman secara otomatis.
        // DETAIL: Membaca status key 'login' dari sessionStorage dan localStorage. 
        //         Jika bernilai true (user sudah login), maka halaman dialihkan ke dashboard.html.
        //         Jika false atau belum login, dialihkan ke halaman login (auth/login.html).
        const isLoggedIn = sessionStorage.getItem('login') === 'true' || localStorage.getItem('login') === 'true';
        if (isLoggedIn) {
            window.location.href = 'dashboard.html';
        } else {
            window.location.href = 'auth/login.html';
        }
    </script>
</body>
</html>
