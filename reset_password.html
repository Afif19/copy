<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SI Toko Bangunan</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="card shadow border-0 p-4" style="max-width: 500px; width: 100%;">
        <div id="reset-content">
            <h5 class="fw-bold mb-3 text-dark">Mereset Password...</h5>
            <p class="text-muted">Harap tunggu sebentar, sistem sedang mengatur ulang data kredensial...</p>
        </div>
    </div>

    <script src="assets/js/db.js"></script>
    <script>
        setTimeout(function() {
            try {
                DB.resetPassword('admin');
                document.getElementById('reset-content').innerHTML = `
                    <div style="font-family: sans-serif; padding: 20px; background-color: #d1e7dd; color: #0f5132; border: 1px solid #badbcc; border-radius: 5px;">
                        <h5 class="fw-bold mb-2">Sukses!</h5>
                        <p class="mb-3">Password untuk username <strong>admin</strong> berhasil diperbarui menjadi <strong>admin</strong>.</p>
                        <a href="auth/login.html" class="btn btn-success btn-sm fw-semibold text-white px-3">Login disini</a>
                        <div class="mt-4 small text-danger font-monospace border-top pt-2">
                            *PENTING: Harap hapus file <code>reset_password.html</code> demi keamanan sistem!
                        </div>
                    </div>
                `;
            } catch (e) {
                document.getElementById('reset-content').innerHTML = `
                    <div class="alert alert-danger" role="alert">
                        <strong>Gagal:</strong> Terjadi kesalahan database: ${e.message}
                    </div>
                `;
            }
        }, 800);
    </script>
</body>
</html>
